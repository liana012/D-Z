<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><!--Кодировка сайта-->
    <title>Название сайта</title>
    <link rel="stylesheet" type="text/css" href="assets/styles/main.css"><!--Подключение стилей-->

    <script type="text/javascript" src = "assets/script/main.js"></script><!--Подключение скриптов -->
</head>
<body

    <div class = "full_width header_wrap colum"><!--Шапка сайта, здесь расположены: слоган и ссылки навигации по сайту-->
        <div class="full_width header_inner row">
             <div class = "tenth_width column header_slogan">
                  <img src = "logo/logo.png">
                  <p align = "right"><b>Великолепный слоган</b></p>
             </div>
             <div class="full_width auth_wrap row">
            <a href = "/">Главная страница</a>
            <a href = "/">Личный кабинет</a>
            <a href = "/">Оставить заявку</a>
             </div>
        </div>
    </div>


    <div class = "full_width auth_wrap row">
        <div class = "auth_inner half_width">
            <form class = "full_width colum">
                <h3>Авторизуйтесь</h3>

                <h5>Введите логин</h5>
                    <input type="text" required="" class ="full_width">
                <h5>Введите пароль</h5>
                    <input type="password" required="" class = "full_width">
                    
                    
                <button>Подтвердить</button>
                <p align="right"><a href="register.html">До сих пор нет аккаунта?</a></p>
            </form>
        </div>
    </div>


    <div class = "full_width footer row"><!--Подвал сайта, здесь расположены: контакты и счетчики -->
        <div class = "contacts_wrap">
            <p>Телефон: +8(999)999-99-99</p>
            <p>Адрес: ул.Пушкина, д.Колотушкина-20</p>
        </div>
        <div class = "counter_wrap"
            <p>Авторизованных пользователей: 30</p>
            <p>Количество заявок: 20</p>
        </div>
    </div>
</body>
</html>
